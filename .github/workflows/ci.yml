name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install PAM development headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev

      - name: Download BBS+ FFI
        run: make download-bbs-ffi

      - name: Download test vectors
        run: make download-test-vectors

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: CGO_ENABLED=1 go test ./...
