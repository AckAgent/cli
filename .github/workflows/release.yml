name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download BBS+ FFI
        run: make download-bbs-ffi

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CGO_ENABLED=1 go build \
            -ldflags="-X github.com/ackagent/cli/internal/shared/version.Version=${VERSION}" \
            -o "ackagent-${GOOS}-${GOARCH}" \
            ./cmd/ackagent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ackagent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ackagent-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "${TAG_NAME}" ackagent-* --generate-notes

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download source tarball and compute SHA256
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          curl -sL "https://github.com/AckAgent/cli/archive/refs/tags/${TAG_NAME}.tar.gz" -o source.tar.gz
          sha256sum source.tar.gz | cut -d' ' -f1 > sha256-source
          echo "source tarball SHA256: $(cat sha256-source)"

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ACKAGENT_CI_ID }}
          private-key: ${{ secrets.GH_APP_ACKAGENT_CI_PRIVATE_KEY }}
          owner: ackagent
          repositories: homebrew-tap

      - uses: actions/checkout@v4
        with:
          repository: AckAgent/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd homebrew-tap
          FORMULA="Formula/ackagent.rb"
          SHA256="$(cat ../sha256-source)"

          sed -i "s|url \"https://github.com/AckAgent/cli/archive/refs/tags/v.*\.tar\.gz\"|url \"https://github.com/AckAgent/cli/archive/refs/tags/v${VERSION}.tar.gz\"|" "$FORMULA"
          sed -i "s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${SHA256}\"/" "$FORMULA"

          echo "Updated ${FORMULA}:"
          cat "$FORMULA"

      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd homebrew-tap
          git config user.name "ackagent-release-bot[bot]"
          git config user.email "ackagent-release-bot[bot]@users.noreply.github.com"
          git add Formula/
          git diff --cached --quiet || git commit -m "ackagent ${VERSION}"
          git push

  bottle:
    needs: update-homebrew
    runs-on: macos-latest
    steps:
      - name: Extract version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build bottle
        run: |
          brew tap ackagent/tap
          brew install --build-bottle ackagent/tap/ackagent

      - name: Create bottle tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          brew bottle --json \
            --root-url="https://github.com/AckAgent/homebrew-tap/releases/download/v${VERSION}" \
            ackagent/tap/ackagent

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ACKAGENT_CI_ID }}
          private-key: ${{ secrets.GH_APP_ACKAGENT_CI_PRIVATE_KEY }}
          owner: ackagent
          repositories: homebrew-tap

      - name: Upload bottle to tap release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for f in ackagent--*.bottle*.tar.gz; do
            mv "$f" "${f/ackagent--/ackagent-}"
          done
          BOTTLE=$(ls ackagent-*.bottle*.tar.gz)
          gh release create "v${VERSION}" "$BOTTLE" \
            --repo AckAgent/homebrew-tap \
            --title "v${VERSION}" \
            --notes "Bottle for ackagent ${VERSION}" \
            || gh release upload "v${VERSION}" "$BOTTLE" \
              --repo AckAgent/homebrew-tap --clobber

      - uses: actions/checkout@v4
        with:
          repository: AckAgent/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap

      - name: Update formula with bottle block
        run: |
          JSON=$(ls *.bottle*.json)
          sed -i '' 's/ackagent--/ackagent-/g' "$JSON"
          brew bottle --merge --write --no-commit "$JSON"
          cp "$(brew --repository ackagent/tap)/Formula/ackagent.rb" homebrew-tap/Formula/ackagent.rb

      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd homebrew-tap
          git config user.name "ackagent-release-bot[bot]"
          git config user.email "ackagent-release-bot[bot]@users.noreply.github.com"
          git add Formula/
          git diff --cached --quiet || git commit -m "bottle: ackagent ${VERSION}"
          git push
